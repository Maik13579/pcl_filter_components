voxel_grid_filter:
  ros__parameters:
    input_topic: "/points/raw"
    output_topic: "/points/voxelized"
    queue_size: 5
    filter:
      leaf_size_x: 0.05
      leaf_size_y: 0.05
      leaf_size_z: 0.05
      output_indices: false
      invert: false

passthrough_filter:
  ros__parameters:
    input_topic: "/points/voxelized"
    output_topic: "/points/passthrough"
    queue_size: 5
    filter:
      field_name: "z"
      min_value: -1.0
      max_value: 2.0
      output_indices: false
      invert: false

crop_box_filter:
  ros__parameters:
    input_topic: "/points/passthrough"
    output_topic: "/points/filtered"
    queue_size: 5
    filter:
      min_x: -10.0
      min_y: -10.0
      min_z: -2.0
      max_x: 10.0
      max_y: 10.0
      max_z: 3.0
      output_indices: false
      invert: false
