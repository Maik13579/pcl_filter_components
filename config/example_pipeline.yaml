version: 1
editor:
  orientation: left_right
nodes:
  - id: input_1
    type: input
    topic: /points/input
    output_type: PointXYZI
    position: {x: 0.0, y: 100.0}
  - type: filter
    name: VoxelGridXYZI_1
    package: pcl_filter_components
    filter: VoxelGridXYZI
    input_type: PointXYZI
    output_type: PointXYZI
    optional_output_type: PointIndices
    parameters:
      filter.leaf_size_x: 0.1
      filter.leaf_size_y: 0.1
      filter.leaf_size_z: 0.1
      filter.invert: false
      filter.output_indices: false
      queue_size: 5
    position: {x: 280.0, y: 100.0}
  - type: topic
    topic: /pcl_pipeline/voxel_filtered
    input_type: PointXYZI
    output_type: PointXYZI
    qos:
      reliability: best_effort
      history: keep_last
      depth: 5
    position: {x: 560.0, y: 100.0}
  - type: filter
    name: CropBoxXYZI_1
    package: pcl_filter_components
    filter: CropBoxXYZI
    input_type: PointXYZI
    output_type: PointXYZI
    optional_output_type: PointIndices
    parameters:
      filter.min_x: -10.0
      filter.min_y: -10.0
      filter.min_z: -2.0
      filter.max_x: 10.0
      filter.max_y: 10.0
      filter.max_z: 3.0
      filter.invert: false
      filter.output_indices: false
      queue_size: 5
    position: {x: 840.0, y: 100.0}
  - id: output_1
    type: output
    topic: /points/output
    input_type: PointXYZI
    position: {x: 1120.0, y: 100.0}
edges:
  - from: {node: input_1, port: out}
    to: {node: VoxelGridXYZI_1, port: in}
  - from: {node: VoxelGridXYZI_1, port: out}
    to: {node: /pcl_pipeline/voxel_filtered, port: in}
  - from: {node: /pcl_pipeline/voxel_filtered, port: out}
    to: {node: CropBoxXYZI_1, port: in}
  - from: {node: CropBoxXYZI_1, port: out}
    to: {node: output_1, port: in}
